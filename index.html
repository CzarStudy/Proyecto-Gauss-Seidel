<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Método de Gauss-Seidel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Calculadora Gauss-Seidel</h1>
        <p>Ingresa los coeficientes del sistema de ecuaciones.</p>
        
        <div class="controls-matrix">
            <button onclick="cambiarTamano(-1)" class="btn-secondary">- Quitar Variable</button>
            <span id="dimension-label">3 x 3</span>
            <button onclick="cambiarTamano(1)" class="btn-secondary">+ Agregar Variable</button>
        </div>

        <div class="matrix-input" id="matrix-container"></div>

        <div class="settings">
            <div>
                <label for="tol">Tolerancia (Error):</label>
                <input type="number" id="tol" value="0.000001" step="any">
            </div>
            <div>
                <label for="maxIter">Iteraciones máx:</label>
                <input type="number" id="maxIter" value="100">
            </div>
        </div>

        <div class="main-buttons">
            <button onclick="resolverGaussSeidel()" class="btn-primary">Calcular</button>
            <button onclick="limpiarTodo()" class="btn-danger">Limpiar Todo</button>
        </div>

        <div id="alerts"></div>

        <div class="results" id="results-container" style="display: none;">
            <h3>Resultados:</h3>
            <div id="final-solution"></div>
            <div class="table-responsive">
                <table id="results-table">
                    <thead>
                        </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <p><strong>Equipo MaxTeam:</strong> Vasquez Ambris Cesar Yamil - 24212681, Cobián Pérez Maximiliano - 24212803, Jimenez Sandoval Ricardo Alfonso - 24212893.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
